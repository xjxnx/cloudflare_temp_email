name = "cloudflare_temp_email"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = [ "nodejs_compat" ]
keep_vars = true

[vars]
DEFAULT_LANG = "zh"
PREFIX = "tmp"
DEFAULT_DOMAINS = ["524028.xyz"]
DOMAINS = ["524028.xyz"]
FRONTEND_URL = "https://mail.524028.xyz"
BLACK_LIST = ""
ENABLE_USER_CREATE_EMAIL = true
ENABLE_USER_DELETE_EMAIL = true
ENABLE_AUTO_REPLY = false
ENABLE_ADDRESS_PASSWORD = false

[[d1_databases]]
binding = "DB"
database_name = "cloudflare_temp_email"
database_id = "6817dba9-7684-4794-88fb-9ac0be4b7f1a"
